<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDA QR-Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --border: #252830;
    --accent: #e8c97e;
    --accent2: #5b8cf5;
    --text: #f0f1f5;
    --muted: #6b7180;
    --input-bg: #1c1f28;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
    background-image: radial-gradient(ellipse 60% 40% at 80% 10%, rgba(91,140,245,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse 40% 30% at 10% 80%, rgba(232,201,126,0.06) 0%, transparent 60%);
  }

  .container { max-width: 860px; margin: 0 auto; }

  header {
    margin-bottom: 40px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 20px;
  }

  .logo-mark {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: #0d0f14; font-weight: 900; flex-shrink: 0;
  }

  .header-text h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; letter-spacing: -0.3px; line-height: 1; }
  .header-text p { font-size: 13px; color: var(--muted); margin-top: 5px; font-weight: 300; }

  .layout { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }

  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px; }

  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px; margin-top: 24px; padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .section-label:first-child { margin-top: 0; padding-top: 0; border-top: none; }

  .row { display: grid; gap: 12px; margin-bottom: 12px; }
  .row.two { grid-template-columns: 1fr 1fr; }
  .row.three { grid-template-columns: 80px 1fr 1fr; }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.3px; }

  input {
    background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 13px; font-size: 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none; width: 100%;
  }
  input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(91,140,245,0.12); }
  input::placeholder { color: var(--muted); opacity: 0.5; }

  .generate-btn {
    width: 100%; margin-top: 24px; padding: 14px;
    background: linear-gradient(135deg, var(--accent2), #7aa4ff);
    border: none; border-radius: 12px; color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.2px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(91,140,245,0.35); }
  .generate-btn:active { transform: translateY(0); }

  .qr-panel { position: sticky; top: 24px; }

  .qr-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px; text-align: center; }

  .qr-placeholder {
    width: 300px; height: 300px; margin: 0 auto 16px;
    border-radius: 14px; background: var(--input-bg);
    border: 2px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px; color: var(--muted); font-size: 12px;
  }
  .qr-placeholder svg { opacity: 0.3; }

  #qr-output { display: none; flex-direction: column; align-items: center; gap: 16px; }
  #qr-output.visible { display: flex; }

  #qrcode { background: white; padding: 12px; border-radius: 14px; display: inline-block; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
  #qrcode canvas, #qrcode img { display: block; border-radius: 6px; }

  .qr-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .qr-company { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .download-btn {
    width: 100%; padding: 11px; background: transparent;
    border: 1px solid var(--accent); border-radius: 10px; color: var(--accent);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.2s, color 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 7px; text-decoration: none;
  }
  .download-btn:hover { background: var(--accent); color: #0d0f14; }

  .tag {
    display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    background: rgba(91,140,245,0.12); color: var(--accent2);
    padding: 3px 8px; border-radius: 6px; text-transform: uppercase; margin-bottom: 20px;
  }

  .hint { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

  @media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; }
    .row.two { grid-template-columns: 1fr; }
    .row.three { grid-template-columns: 1fr 1fr; }
    .qr-panel { position: static; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-mark">T</div>
    <div class="header-text">
      <h1>Visitenkarten QR-Generator</h1>
      <p>TDA-HR-Software-Entwicklungs GmbH &mdash; Digitale Kontaktkarten</p>
    </div>
  </header>

  <div class="layout">
    <div class="form-card">
      <div class="tag">vCard 3.0</div>

      <div class="section-label">Persönliche Angaben</div>
      <div class="row two">
        <div class="field"><label>Vorname *</label><input type="text" id="vorname" placeholder="z. B. Kevin" /></div>
        <div class="field"><label>Nachname *</label><input type="text" id="nachname" placeholder="z. B. Mustermann" /></div>
      </div>
      <div class="row two">
        <div class="field"><label>Position / Titel</label><input type="text" id="position" placeholder="z. B. Team Projekte" /></div>
        <div class="field"><label>Abteilung / Firma</label><input type="text" id="firma" placeholder="TDA-HR-Software-Entwicklungs GmbH" /></div>
      </div>

      <div class="section-label">Kontaktdaten</div>
      <div class="row two">
        <div class="field"><label>Telefon</label><input type="tel" id="telefon" placeholder="+49 155 ..." /></div>
        <div class="field"><label>E-Mail *</label><input type="email" id="email" placeholder="name@muster.de" /></div>
      </div>
      <div class="row">
        <div class="field"><label>Website</label><input type="url" id="website" placeholder="https://muster.de" /></div>
      </div>

      <div class="section-label">Adresse</div>
      <div class="row">
        <div class="field"><label>Straße &amp; Hausnummer</label><input type="text" id="strasse" placeholder="Musterstraße 1" /></div>
      </div>
      <div class="row three">
        <div class="field"><label>PLZ</label><input type="text" id="plz" placeholder="12345" /></div>
        <div class="field"><label>Ort</label><input type="text" id="ort" placeholder="Musterstadt" /></div>
        <div class="field"><label>Land</label><input type="text" id="land" value="Deutschland" /></div>
      </div>

      <button class="generate-btn" onclick="generateQR()">⬡ QR-Code generieren</button>
    </div>

    <div class="qr-panel">
      <div class="qr-card">
        <div id="qr-placeholder" class="qr-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <path d="M14 14h2v2h-2zM18 14h3M14 18h3M20 18v3M17 21h3"/>
          </svg>
          <span>Formular ausfüllen<br>und generieren</span>
        </div>
        <div id="qr-output">
          <div id="qrcode"></div>
          <div>
            <div class="qr-name" id="qr-label-name"></div>
            <div class="qr-company" id="qr-label-company"></div>
          </div>
          <a class="download-btn" id="download-link" href="#" download>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            PNG herunterladen
          </a>
          <p class="hint">Mit Smartphone-Kamera scannen,<br>um Kontakt zu speichern.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function generateQR() {
  const vorname = document.getElementById('vorname').value.trim();
  const nachname = document.getElementById('nachname').value.trim();
  if (!vorname || !nachname) { alert('Bitte mindestens Vor- und Nachname angeben.'); return; }

  const firma    = document.getElementById('firma').value.trim();
  const position = document.getElementById('position').value.trim();
  const telefon  = document.getElementById('telefon').value.trim();
  const email    = document.getElementById('email').value.trim();
  const website  = document.getElementById('website').value.trim();
  const strasse  = document.getElementById('strasse').value.trim();
  const plz      = document.getElementById('plz').value.trim();
  const ort      = document.getElementById('ort').value.trim();
  const land     = document.getElementById('land').value.trim();

  const vcard = [
    'BEGIN:VCARD', 'VERSION:3.0',
    `N:${nachname};${vorname}`,
    `FN:${vorname} ${nachname}`,
    firma    ? `ORG:${firma}`                        : '',
    position ? `TITLE:${position}`                   : '',
    telefon  ? `TEL;TYPE=WORK,VOICE:${telefon}`      : '',
    email    ? `EMAIL;TYPE=INTERNET:${email}`         : '',
    website  ? `URL:${website}`                       : '',
    (strasse || ort || plz || land) ? `ADR;TYPE=WORK:;;${strasse};${ort};;${plz};${land}` : '',
    'END:VCARD'
  ].filter(Boolean).join('\n');

  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = '';
  new QRCode(qrDiv, { text: vcard, width: 300, height: 300, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.L });

  document.getElementById('qr-label-name').textContent = `${vorname} ${nachname}`;
  document.getElementById('qr-label-company').textContent = firma || '';
  document.getElementById('qr-placeholder').style.display = 'none';
  document.getElementById('qr-output').classList.add('visible');

  setTimeout(() => {
    const canvas = qrDiv.querySelector('canvas');
    if (canvas) {
      const link = document.getElementById('download-link');
      link.href = canvas.toDataURL('image/png');
      link.download = `${vorname.toLowerCase()}_${nachname.toLowerCase()}_qr.png`;
    }
  }, 300);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') generateQR(); });
</script>
</body>
</html>
